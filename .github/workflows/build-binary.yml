name: Build binary

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wx-acpx-linux-x64
            outfile: wx-acpx-linux-x64
          - os: macos-latest
            artifact: wx-acpx-darwin-arm64
            outfile: wx-acpx-darwin-arm64
          - os: windows-latest
            artifact: wx-acpx-windows-x64
            outfile: wx-acpx-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Compile binary
        run: bun build ./index.ts --compile --outfile ${{ matrix.outfile }}

      - name: Post-build notes (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## macOS 打不开 / 提示「已损坏」？

          从 GitHub Release 用浏览器（例如 Chrome）下载的未签名二进制，可能会被 macOS 打上隔离标记（`com.apple.quarantine`），导致提示「已损坏」或无法打开。

          解决：在终端执行（把路径替换成你的实际文件）：

          ```bash
          xattr -d com.apple.quarantine /path/to/wx-acpx-darwin-arm64
          # 或递归清除扩展属性：
          # xattr -cr /path/to/wx-acpx-darwin-arm64
          ```
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/wx-acpx-linux-x64
            release-assets/wx-acpx-darwin-arm64
            release-assets/wx-acpx-windows-x64.exe
